<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Work Tracker Pro</title>
<style>
  /* Dark mode iOS Calculator vibes */
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background-color: #000000; 
    color: #ffffff; 
    margin: 0; 
    padding: 10px; /* Reduced padding to fit screen */
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    box-sizing: border-box;
    overscroll-behavior: none;
  }
  
  /* Variable Cards */
  .cards-container { display: flex; gap: 10px; margin-bottom: 10px; }
  .card { 
    flex: 1; 
    background-color: #1c1c1e; 
    padding: 10px; 
    border-radius: 16px; 
    border: 2px solid transparent;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    cursor: pointer;
    touch-action: manipulation;
  }
  .card.active { 
    border-color: #0a84ff; 
    background-color: #2c2c2e; 
  }
  
  /* Editable Titles */
  .var-title { 
    width: 100%; 
    background: transparent; 
    border: none; 
    color: #8e8e93; 
    font-size: 14px; 
    text-align: center; 
    text-transform: uppercase; 
    font-weight: bold;
    margin-bottom: 5px;
  }
  .var-title:focus { outline: none; color: #ffffff; }
  
  /* Big Number Display (No longer triggers keyboard) */
  .var-val { 
    font-size: 32px; 
    font-weight: bold; 
    color: #ffffff;
    margin: 10px 0;
    pointer-events: none; /* Passes clicks through to the card to prevent highlighting */
  }

  /* Dedicated Manual Edit Button */
  .edit-btn {
    background: #3a3a3c;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  /* Numpad Display */
  .calc-display {
    font-size: 40px;
    text-align: right;
    padding: 5px 15px;
    margin-bottom: 10px;
    color: #f2f2f7;
    min-height: 48px;
  }

  /* Special Emoji Row */
  .special-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 10px;
  }
  .special-row button {
    background-color: #1c1c1e;
    color: white;
    font-size: 24px; /* Big emojis */
    border: none;
    border-radius: 12px;
    padding: 10px 0;
    cursor: pointer;
    touch-action: manipulation;
  }
  .special-row button:active { background-color: #3a3a3c; }

  /* Numpad Grid */
  .numpad { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 8px; 
    margin-bottom: 8px;
    margin-top: auto; 
  }
  .numpad button { 
    background-color: #333333; 
    color: #ffffff; 
    font-size: 28px; 
    border: none; 
    border-radius: 40px; 
    padding: 12px 0; 
    cursor: pointer;
    touch-action: manipulation;
  }
  .numpad button:active { background-color: #737373; }
  .numpad button.action-btn { background-color: #a5a5a5; color: #000; }
  .numpad button.action-btn:active { background-color: #d4d4d4; }

  /* Plus/Minus Row */
  .operators { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .operators button {
    font-size: 36px;
    border: none;
    border-radius: 16px;
    padding: 12px 0;
    color: white;
    touch-action: manipulation;
  }
  .btn-minus { background-color: #ff453a; }
  .btn-plus { background-color: #30d158; }
  .operators button:active { opacity: 0.6; }

</style>
</head>
<body>

<div class="cards-container">
  <div class="card active" id="card1" onclick="setActive(1)">
    <input type="text" id="title1" class="var-title" value="Variable 1" onclick="event.stopPropagation()">
    <div id="val1" class="var-val">0</div>
    <button class="edit-btn" onclick="manualEdit(1, event)">✏️ Edit</button>
  </div>
  
  <div class="card" id="card2" onclick="setActive(2)">
    <input type="text" id="title2" class="var-title" value="Variable 2" onclick="event.stopPropagation()">
    <div id="val2" class="var-val">0</div>
    <button class="edit-btn" onclick="manualEdit(2, event)">✏️ Edit</button>
  </div>
</div>

<div class="calc-display" id="display"></div>

<div class="special-row">
  <button onclick="setSpecial('0.02')">☕️</button>
  <button onclick="setSpecial('0.03')">🍪</button>
  <button onclick="setSpecial('0.04')">💧</button>
</div>

<div class="numpad">
  <button onclick="append('7')">7</button>
  <button onclick="append('8')">8</button>
  <button onclick="append('9')">9</button>
  <button onclick="append('4')">4</button>
  <button onclick="append('5')">5</button>
  <button onclick="append('6')">6</button>
  <button onclick="append('1')">1</button>
  <button onclick="append('2')">2</button>
  <button onclick="append('3')">3</button>
  <button onclick="clearCalc()" class="action-btn">C</button>
  <button onclick="append('0')">0</button>
  <button onclick="append('.')">.</button>
</div>

<div class="operators">
  <button class="btn-minus" onclick="applyMath(-1)">−</button>
  <button class="btn-plus" onclick="applyMath(1)">+</button>
</div>

<script>
  let activeVar = 1;
  let currentEntry = '';

  // 1. Load saved data on startup
  window.onload = function() {
    if(localStorage.getItem('title1')) document.getElementById('title1').value = localStorage.getItem('title1');
    if(localStorage.getItem('title2')) document.getElementById('title2').value = localStorage.getItem('title2');
    if(localStorage.getItem('val1')) document.getElementById('val1').innerText = localStorage.getItem('val1');
    if(localStorage.getItem('val2')) document.getElementById('val2').innerText = localStorage.getItem('val2');
  };

  // 2. Save titles immediately when typed
  document.getElementById('title1').addEventListener('input', (e) => localStorage.setItem('title1', e.target.value));
  document.getElementById('title2').addEventListener('input', (e) => localStorage.setItem('title2', e.target.value));

  // 3. Highlight active box safely
  function setActive(num) {
    activeVar = num;
    document.getElementById('card1').classList.remove('active');
    document.getElementById('card2').classList.remove('active');
    document.getElementById('card' + num).classList.add('active');
  }

  // 4. Safe Manual Edit Prompt (avoids jumping keyboard)
  function manualEdit(num, event) {
    event.stopPropagation(); // Stops the card from being clicked at the same time
    let currentVal = document.getElementById('val' + num).innerText;
    let newVal = prompt("Enter manual value:", currentVal);
    
    // If they typed a valid number, save it
    if (newVal !== null && newVal.trim() !== "" && !isNaN(newVal)) {
      document.getElementById('val' + num).innerText = newVal;
      localStorage.setItem('val' + num, newVal);
    }
  }

  // 5. Special Emoji Buttons
  function setSpecial(val) {
    currentEntry = val;
    updateDisplay();
  }

  // 6. Numpad Logic
  function append(char) {
    if (char === '.' && currentEntry.includes('.')) return; 
    currentEntry += char;
    updateDisplay();
  }

  function clearCalc() {
    currentEntry = '';
    updateDisplay();
  }

  function updateDisplay() {
    document.getElementById('display').innerText = currentEntry;
  }

  // 7. Apply the math
  function applyMath(multiplier) {
    if (!currentEntry) return; 
    
    let targetId = 'val' + activeVar;
    let currentBoxVal = parseFloat(document.getElementById(targetId).innerText) || 0;
    let adjustmentVal = parseFloat(currentEntry) || 0;
    
    let newVal = currentBoxVal + (adjustmentVal * multiplier);
    newVal = Math.round(newVal * 1000) / 1000; // Fixes Javascript decimal bugs
    
    document.getElementById(targetId).innerText = newVal;
    localStorage.setItem(targetId, newVal);
    
    clearCalc();
  }
</script>
</body>
</html>
